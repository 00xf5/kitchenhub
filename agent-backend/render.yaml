services:
  - type: web
    name: kitchenhub-agent-backend
    env: go
    startCommand: ./app
    envVars:
      - key: AGENT_ID
        sync: false
      - key: AGENT_NAME
        sync: false
      - key: AGENT_EMAIL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: BACKEND_PORT
        value: 3000
